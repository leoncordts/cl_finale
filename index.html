<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 CL-Finale Live-Tippspiel</title>
    <!-- Firebase SDKs laden -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-dark: #060b19;
            --panel-bg: #101935;
            --card-bg: #18264f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyan-glow: #00f0ff;
            --gold: #fbbf24;
            --green-match: #10b981;
            --red-eliminated: #ef4444;
            --border-color: #23356f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .admin-panel { background: linear-gradient(135deg, var(--panel-bg), #0a1128); border: 2px solid var(--border-color); border-radius: 15px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .panel-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--cyan-glow); margin-bottom: 15px; text-align: center; font-weight: bold; }
        .score-control-row { display: flex; justify-content: space-around; align-items: center; gap: 15px; }
        .team-box { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .team-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }
        .score-actions { display: flex; align-items: center; gap: 10px; }
        .btn-score { background-color: var(--card-bg); border: 1px solid var(--cyan-glow); color: white; font-size: 1.5rem; width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-score:hover { background-color: var(--cyan-glow); color: var(--bg-dark); box-shadow: 0 0 10px var(--cyan-glow); }
        .score-display { font-size: 2.5rem; font-family: monospace; font-weight: bold; min-width: 50px; text-align: center; background: #000; padding: 2px 10px; border-radius: 5px; border: 1px solid var(--border-color); }
        .divider { font-size: 2rem; font-weight: bold; color: var(--text-muted); }
        .minute-control-box { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center; gap: 15px; }
        .minute-control-box label { font-size: 1rem; color: var(--text-main); }
        .minute-input { width: 80px; background-color: #000; border: 1px solid var(--border-color); color: white; font-size: 1.2rem; padding: 8px; border-radius: 5px; text-align: center; font-family: monospace; }
        .minute-input:focus { outline: none; border-color: var(--cyan-glow); box-shadow: 0 0 8px var(--cyan-glow); }
        .leaderboard { width: 100%; background-color: var(--panel-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .table-header { display: grid; grid-template-columns: 80px 1fr 100px 110px 130px; background-color: rgba(0, 0, 0, 0.3); padding: 12px 15px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 2px solid var(--border-color); }
        .table-body { display: flex; flex-direction: column; }
        .player-row { display: grid; grid-template-columns: 80px 1fr 100px 110px 130px; padding: 15px; align-items: center; border-bottom: 1px solid var(--border-color); transition: all 0.3s ease; }
        .player-row:last-child { border-bottom: none; }
        .rank { font-weight: bold; font-size: 1.1rem; color: var(--text-muted); }
        .rank-1 { color: var(--gold); text-shadow: 0 0 8px rgba(251, 191, 36, 0.4); }
        .rank-2 { color: #cbd5e1; }
        .rank-3 { color: #cd7f32; }
        .name { font-weight: 600; font-size: 1.05rem; }
        .tipp { font-family: monospace; font-size: 1.1rem; background-color: rgba(0,0,0,0.2); padding: 3px 8px; border-radius: 4px; width: max-content; }
        .tipp-minute { color: var(--text-muted); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; text-align: center; letter-spacing: 0.5px; width: max-content; display: inline-block; }
        .status-rennen { background-color: rgba(0, 240, 255, 0.15); color: var(--cyan-glow); border: 1px solid var(--cyan-glow); }
        .status-exact { background-color: rgba(16, 185, 129, 0.2); color: var(--green-match); border: 1px solid var(--green-match); animation: pulse 2s infinite; }
        .status-ausgeschieden { background-color: rgba(239, 68, 68, 0.1); color: #64748b; border: 1px solid #334155; }
        .player-row.eliminated { opacity: 0.4; background-color: rgba(0,0,0,0.1); }
        .player-row.winner-glow { background: linear-gradient(90deg, rgba(16, 185, 129, 0.1), transparent); border-left: 4px solid var(--green-match); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        @media (max-width: 550px) {
            body { padding: 10px; }
            h1 { font-size: 1.4rem; margin-bottom: 15px; }
            .admin-panel { padding: 12px; margin-bottom: 15px; }
            .team-name { font-size: 0.95rem; margin-bottom: 5px; }
            .score-display { font-size: 1.8rem; min-width: 42px; padding: 2px 6px; }
            .btn-score { width: 36px; height: 36px; font-size: 1.2rem; }
            .divider { font-size: 1.5rem; }
            .minute-control-box { flex-direction: column; gap: 8px; text-align: center; margin-top: 15px; padding-top: 10px; }
            .minute-control-box label { font-size: 0.9rem; }
            .table-header { display: none; }
            .player-row { display: grid; grid-template-areas: "rank name tipp" "rank status minute"; grid-template-columns: 32px 1fr auto; row-gap: 6px; column-gap: 8px; padding: 12px; }
            .rank { grid-area: rank; align-self: center; font-size: 1rem; }
            .name { grid-area: name; font-size: 1rem; align-self: center; }
            .tipp { grid-area: tipp; justify-self: end; font-size: 1rem; padding: 2px 6px; }
            .status-col { grid-area: status; align-self: center; }
            .tipp-minute { grid-area: minute; justify-self: end; align-self: center; font-size: 0.8rem; }
            .status-badge { padding: 3px 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏆 CL-Tippspiel Live-Tabelle</h1>

        <!-- LIVE CONTROL PANEL -->
        <div class="admin-panel">
            <div class="panel-title">⚡ Live Spielstand eintragen (Synchronisiert)</div>
            <div class="score-control-row">
                <div class="team-box">
                    <div class="team-name">🇫🇷 Paris SG</div>
                    <div class="score-actions">
                        <button class="btn-score" onclick="changeScore('home', -1)">-</button>
                        <div class="score-display" id="live-home">0</div>
                        <button class="btn-score" onclick="changeScore('home', 1)">+</button>
                    </div>
                </div>
                <div class="divider">:</div>
                <div class="team-box">
                    <div class="team-name">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Arsenal</div>
                    <div class="score-actions">
                        <button class="btn-score" onclick="changeScore('away', -1)">-</button>
                        <div class="score-display" id="live-away">0</div>
                        <button class="btn-score" onclick="changeScore('away', 1)">+</button>
                    </div>
                </div>
            </div>
            <div class="minute-control-box">
                <label for="goal-minute">⏱️ Minute des 1. Tores:</label>
                <input type="number" id="goal-minute" class="minute-input" min="0" max="120" placeholder="--" oninput="saveMinuteToDatabase(this.value)">
            </div>
        </div>

        <!-- LEADERBOARD TABELLE -->
        <div class="leaderboard">
            <div class="table-header">
                <div>Rang</div><div>Name</div><div>Tipp</div><div>Minute</div><div>Status</div>
            </div>
            <div class="table-body" id="table-content"></div>
        </div>
    </div>

    <script>
        // Eure Firebase Konfiguration aus image_2ef061.png
        const firebaseConfig = {
            apiKey: "AIzaSyCsQN06ygiNr6EIO522Yszyc2WvA53PWA",
            authDomain: "cl-finale.firebaseapp.com",
            databaseURL: "https://cl-finale-default-rtdb.firebaseio.com",
            projectId: "cl-finale",
            storageBucket: "cl-finale.firebasestorage.app",
            messagingSenderId: "640980759908",
            appId: "1:640980759908:web:2e6544664f7f7198073671"
        };
        
        // Firebase initialisieren
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const playersData = [
            { name: "Ollo", home: 3, away: 1, minute: 19 },
            { name: "Sören", home: 2, away: 1, minute: 28 },
            { name: "Eckhard", home: 3, away: 1, minute: 30 },
            { name: "Benjamin Dinges", home: 2, away: 1, minute: 34 },
            { name: "Leon", home: 3, away: 1, minute: 38 },
            { name: "Christian", home: 1, away: 2, minute: 41 },
            { name: "Ingo", home: 2, away: 0, minute: 51 }
        ];

        let liveHome = 0;
        let liveAway = 0;
        let actualMinute = null;

        // Echtzeit-Listener: Lauscht auf Änderungen in der Cloud
        database.ref('matchState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                liveHome = data.homeScore || 0;
                liveAway = data.awayScore || 0;
                actualMinute = data.goalMinute !== undefined ? data.goalMinute : null;
                
                document.getElementById('live-home').innerText = liveHome;
                document.getElementById('live-away').innerText = liveAway;
                document.getElementById('goal-minute').value = actualMinute !== null ? actualMinute : "";
                
                updateTableLayout();
            }
        });

        function changeScore(team, val) {
            if (team === 'home') {
                liveHome = Math.max(0, liveHome + val);
            } else {
                liveAway = Math.max(0, liveAway + val);
            }
            database.ref('matchState').update({
                homeScore: liveHome,
                awayScore: liveAway
            });
        }

        function saveMinuteToDatabase(value) {
            const min = value !== "" ? parseInt(value) : null;
            database.ref('matchState').update({
                goalMinute: min
            });
        }

        function updateTableLayout() {
            const processedPlayers = playersData.map(player => {
                const isExact = (player.home === liveHome && player.away === liveAway);
                const isEliminated = (liveHome > player.home || liveAway > player.away);
                let deviation = Infinity;
                if (actualMinute !== null) {
                    deviation = Math.abs(player.minute - actualMinute);
                }
                return { ...player, isExact, isEliminated, deviation };
            });

            processedPlayers.sort((a, b) => {
                if (a.isExact && !b.isExact) return -1;
                if (!a.isExact && b.isExact) return 1;
                if (!a.isEliminated && b.isEliminated) return -1;
                if (a.isEliminated && !b.isEliminated) return 1;
                if (actualMinute !== null && a.deviation !== b.deviation) {
                    return a.deviation - b.deviation;
                }
                return a.name.localeCompare(b.name);
            });

            const tableBody = document.getElementById('table-content');
            tableBody.innerHTML = "";

            processedPlayers.forEach((player, index) => {
                const rank = index + 1;
                let rowClass = "player-row";
                let statusBadge = "";
                if (player.isExact) { rowClass += " winner-glow"; statusBadge = `<span class="status-badge status-exact">Exakt 🎯</span>`; }
                else if (player.isEliminated) { rowClass += " eliminated"; statusBadge = `<span class="status-badge status-ausgeschieden">Raus ❌</span>`; }
                else { statusBadge = `<span class="status-badge status-rennen">Im Rennen 🏃‍♂️</span>`; }

                let minuteDisplay = `${player.minute}. Min`;
                if (actualMinute !== null && !player.isEliminated) {
                    minuteDisplay += ` <span style="color:var(--cyan-glow); font-weight:bold;">(Δ ${player.deviation}m)</span>`;
                }

                tableBody.innerHTML += `
                    <div class="${rowClass}">
                        <div class="rank rank-${rank}">#${rank}</div>
                        <div class="name">${player.name}</div>
                        <div class="tipp">${player.home}:${player.away}</div>
                        <div class="status-col">${statusBadge}</div>
                        <div class="tipp-minute">${minuteDisplay}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
